# CCPE Multi-Frame 1024p — Temporal Fire/Smoke Detection
# 6-channel input (current RGB + previous frame RGB at -60s or -360s)

model:
  num_classes: 2
  in_channels: 6  # current + previous frame
  embed_dims: 96
  depths: [2, 2, 6, 2]
  num_heads: [3, 6, 12, 24]
  window_size: 7
  fpn_channels: 128
  input_size: [1024, 1024]
  contrast_steps: [1, 2, 4, 8, 16, 32, 64, 128]
  use_checkpoint: false  # see ccpe_single_1024.yaml — bs=16 + no checkpoint avoids OOM AND bf16 NaN cascade
  # Pretrained Swin DISABLED — same bf16 issue as ccpe_single_1024.yaml.
  pretrained_swin: null  # checkpoints/swin_tiny_patch4_window7_224.pth

data:
  # For multi-frame, dataset loader concatenates current+previous frame
  train_img_dir: /home/whamidouche/ssdprivate/datasets/data_v3_and_imerit_upto_april06_2classes_40_unseen_cams_cleaned/train/images
  train_label_dir: /home/whamidouche/ssdprivate/datasets/data_v3_and_imerit_upto_april06_2classes_40_unseen_cams_cleaned/train/labels
  val_img_dir: /home/whamidouche/ssdprivate/datasets/data_v3_and_imerit_upto_april06_2classes_40_unseen_cams_cleaned/test_random/images
  val_label_dir: /home/whamidouche/ssdprivate/datasets/data_v3_and_imerit_upto_april06_2classes_40_unseen_cams_cleaned/test_random/labels
  batch_size: 16
  num_workers: 8
  mosaic_prob: 1.0
  mixup_prob: 0.3
  multi_frame: true
  frame_interval: 60  # seconds between frames

optimizer:
  # bs=16 per-GPU x 2 GPUs = global batch 32. See ccpe_single_1024.yaml.
  lr: 4.0e-4
  momentum: 0.9
  weight_decay: 0.0005

training:
  max_epochs: 50
  warmup_epochs: 5
  val_interval: 1
  save_interval: 2
  grad_clip: 10.0  # tighter than YOLOX default (35) for bf16 stability

output_dir: runs/ccpe_multi_1024
log_interval: 50

# CCPE Multi-Frame 1024p — Temporal Fire/Smoke Detection
# 6-channel input (current RGB + previous frame RGB at -60s or -360s)

model:
  num_classes: 2
  in_channels: 6  # current + previous frame
  embed_dims: 96
  depths: [2, 2, 6, 2]
  num_heads: [3, 6, 12, 24]
  window_size: 7
  fpn_channels: 128
  input_size: [1024, 1024]
  contrast_steps: [1, 2, 4, 8, 16, 32, 64, 128]
  use_checkpoint: true
  pretrained_swin: null  # cannot use pretrained (6ch vs 3ch)

data:
  # For multi-frame, dataset loader concatenates current+previous frame
  train_img_dir: /home/whamidouche/ssdprivate/fire-smoke-benchmark-package/data/train/images
  train_label_dir: /home/whamidouche/ssdprivate/fire-smoke-benchmark-package/data/train/labels
  val_img_dir: /home/whamidouche/ssdprivate/fire-smoke-benchmark-package/data/test_random/images
  val_label_dir: /home/whamidouche/ssdprivate/fire-smoke-benchmark-package/data/test_random/labels
  batch_size: 4
  num_workers: 8
  mosaic_prob: 1.0
  mixup_prob: 0.3
  multi_frame: true
  frame_interval: 60  # seconds between frames

optimizer:
  lr: 0.0001
  momentum: 0.9
  weight_decay: 0.0005

training:
  max_epochs: 60
  warmup_epochs: 2
  val_interval: 5
  save_interval: 10
  grad_clip: 35.0

output_dir: runs/ccpe_multi_1024
log_interval: 50

# CCPE Single-Frame 1024p — Fire/Smoke Detection
# Swin-Tiny + Cross Contrast Patch Embedding + YOLOX Head with SNSM

model:
  num_classes: 2  # smoke=0, fire=1
  in_channels: 3
  embed_dims: 96
  depths: [2, 2, 6, 2]
  num_heads: [3, 6, 12, 24]
  window_size: 7
  fpn_channels: 128
  input_size: [1024, 1024]
  contrast_steps: [1, 2, 4, 8, 16, 32, 64, 128]
  # Gradient checkpointing DISABLED: when enabled with bf16 autocast, the
  # recomputed-forward path produces inf gradients on a high fraction of
  # batches (scaler.scale collapses 65536 -> 0 within ~100 batches, ~50%
  # step-skip rate, eventual NaN model state by batch ~200). Avoiding
  # checkpoint by using a smaller batch size instead (bs=16) keeps memory
  # under control AND keeps numerics healthy.
  use_checkpoint: false
  # Pretrained Swin DISABLED: same bf16 instability — pretrained attention
  # magnitudes overflow under autocast (96% step-skip rate observed).
  # To re-enable: cast Swin attention ops to fp32 in models/swin_ccpe.py.
  pretrained_swin: null  # checkpoints/swin_tiny_patch4_window7_224.pth

data:
  # YOLO-format dataset (our April13 dataset)
  train_img_dir: /home/whamidouche/ssdprivate/datasets/data_v3_and_imerit_upto_april06_2classes_40_unseen_cams_cleaned/train/images
  train_label_dir: /home/whamidouche/ssdprivate/datasets/data_v3_and_imerit_upto_april06_2classes_40_unseen_cams_cleaned/train/labels
  val_img_dir: /home/whamidouche/ssdprivate/datasets/data_v3_and_imerit_upto_april06_2classes_40_unseen_cams_cleaned/test_random/images
  val_label_dir: /home/whamidouche/ssdprivate/datasets/data_v3_and_imerit_upto_april06_2classes_40_unseen_cams_cleaned/test_random/labels
  batch_size: 16
  num_workers: 8
  mosaic_prob: 1.0
  mixup_prob: 0.5

optimizer:
  # bs=16 per-GPU * 2 GPUs = global batch 32. Linear-scaling from baseline
  # bs=4 lr=1e-4 -> 4.0e-4. (Originally tried bs=32 + lr=8e-4, but bs=32
  # without checkpoint OOMs at 92 GB peak, and bs=32 with checkpoint
  # triggers bf16 NaN cascade by batch ~200. bs=16 + no checkpoint is the
  # stable middle ground.)
  lr: 4.0e-4
  momentum: 0.9
  weight_decay: 0.0005

training:
  max_epochs: 50
  warmup_epochs: 5
  val_interval: 1
  save_interval: 2
  grad_clip: 10.0  # tighter than YOLOX default (35) for bf16 stability

output_dir: runs/ccpe_single_1024
log_interval: 50

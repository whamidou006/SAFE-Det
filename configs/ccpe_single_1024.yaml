# CCPE Single-Frame 1024p — Fire/Smoke Detection
# Swin-Tiny + Cross Contrast Patch Embedding + YOLOX Head with SNSM

model:
  num_classes: 2  # smoke=0, fire=1
  in_channels: 3
  embed_dims: 96
  depths: [2, 2, 6, 2]
  num_heads: [3, 6, 12, 24]
  window_size: 7
  fpn_channels: 128
  input_size: [1024, 1024]
  contrast_steps: [1, 2, 4, 8, 16, 32, 64, 128]
  use_checkpoint: true  # re-enabled: bs=32 / 1024² peaks > 90 GB without it (OOM after a few epochs); cuts peak memory ~3x at ~30% compute cost
  # Pretrained Swin temporarily DISABLED while we work out a bf16-safe
  # loading path. Symptom when enabled: GradScaler scale collapses
  # (32768 -> ~0 within 50 batches), 96% step-skip rate, loss frozen.
  # The pretrained attention weights interact poorly with bf16 autocast
  # (likely QKV matmul or relative_position_bias overflow in low
  # precision), producing inf gradients almost every batch. To re-enable:
  # need to cast specific Swin attention ops to fp32 inside
  # models/swin_ccpe.py. See checkpoints/swin_tiny_patch4_window7_224.pth
  # which is already downloaded and ready.
  pretrained_swin: null  # checkpoints/swin_tiny_patch4_window7_224.pth

data:
  # YOLO-format dataset (our April13 dataset)
  train_img_dir: /home/whamidouche/ssdprivate/datasets/data_v3_and_imerit_upto_april06_2classes_40_unseen_cams_cleaned/train/images
  train_label_dir: /home/whamidouche/ssdprivate/datasets/data_v3_and_imerit_upto_april06_2classes_40_unseen_cams_cleaned/train/labels
  val_img_dir: /home/whamidouche/ssdprivate/datasets/data_v3_and_imerit_upto_april06_2classes_40_unseen_cams_cleaned/test_random/images
  val_label_dir: /home/whamidouche/ssdprivate/datasets/data_v3_and_imerit_upto_april06_2classes_40_unseen_cams_cleaned/test_random/labels
  batch_size: 32
  num_workers: 8
  mosaic_prob: 1.0
  mixup_prob: 0.5

optimizer:
  # 8.0e-4 = linear-scaled from-scratch LR (Goyal et al. 2017): bs=4
  # baseline lr=1e-4 -> bs=32 lr=8e-4. (We tried 2e-4 + pretrained
  # backbone but it triggered inf-gradient skip storms under bf16
  # autocast — see model.pretrained_swin. Reverted to from-scratch.)
  lr: 8.0e-4
  momentum: 0.9
  weight_decay: 0.0005

training:
  max_epochs: 50
  warmup_epochs: 5
  val_interval: 1
  save_interval: 2
  grad_clip: 35.0

output_dir: runs/ccpe_single_1024
log_interval: 50

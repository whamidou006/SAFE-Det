# CCPE Single-Frame 1024p — Fire/Smoke Detection
# Swin-Tiny + Cross Contrast Patch Embedding + YOLOX Head with SNSM

model:
  num_classes: 2  # smoke=0, fire=1
  in_channels: 3
  embed_dims: 96
  depths: [2, 2, 6, 2]
  num_heads: [3, 6, 12, 24]
  window_size: 7
  fpn_channels: 128
  input_size: [1024, 1024]
  contrast_steps: [1, 2, 4, 8, 16, 32, 64, 128]
  use_checkpoint: true  # gradient checkpointing to save memory
  pretrained_swin: null  # set to path for Swin-T pretrained weights

data:
  # YOLO-format dataset (our April13 dataset)
  train_img_dir: /home/whamidouche/ssdprivate/fire-smoke-benchmark-package/data/train/images
  train_label_dir: /home/whamidouche/ssdprivate/fire-smoke-benchmark-package/data/train/labels
  val_img_dir: /home/whamidouche/ssdprivate/fire-smoke-benchmark-package/data/test_random/images
  val_label_dir: /home/whamidouche/ssdprivate/fire-smoke-benchmark-package/data/test_random/labels
  batch_size: 4
  num_workers: 8
  mosaic_prob: 1.0
  mixup_prob: 0.5

optimizer:
  lr: 0.0001
  momentum: 0.9
  weight_decay: 0.0005

training:
  max_epochs: 80
  warmup_epochs: 2
  val_interval: 5
  save_interval: 10
  grad_clip: 35.0

output_dir: runs/ccpe_single_1024
log_interval: 50

# CCPE Swin-Base 1024p — Larger backbone variant
# Swin-Base has 2x wider channels → better accuracy, more compute

model:
  num_classes: 2
  in_channels: 3
  embed_dims: 128  # Swin-Base (vs 96 for Tiny)
  depths: [2, 2, 18, 2]  # deeper stage 3
  num_heads: [4, 8, 16, 32]
  window_size: 7
  fpn_channels: 192  # wider FPN for larger backbone
  input_size: [1024, 1024]
  contrast_steps: [1, 2, 4, 8, 16, 32, 64, 128]
  use_checkpoint: false  # disabled: GPU memory headroom available; saves ~30% compute
  # Swin-Base needs different weights. Download and set:
  #   curl -L -o checkpoints/swin_base_patch4_window7_224.pth \
  #     https://github.com/SwinTransformer/storage/releases/download/v1.0.0/swin_base_patch4_window7_224.pth
  pretrained_swin: null  # set to checkpoints/swin_base_patch4_window7_224.pth

data:
  train_img_dir: /home/whamidouche/ssdprivate/datasets/data_v3_and_imerit_upto_april06_2classes_40_unseen_cams_cleaned/train/images
  train_label_dir: /home/whamidouche/ssdprivate/datasets/data_v3_and_imerit_upto_april06_2classes_40_unseen_cams_cleaned/train/labels
  val_img_dir: /home/whamidouche/ssdprivate/datasets/data_v3_and_imerit_upto_april06_2classes_40_unseen_cams_cleaned/test_random/images
  val_label_dir: /home/whamidouche/ssdprivate/datasets/data_v3_and_imerit_upto_april06_2classes_40_unseen_cams_cleaned/test_random/labels
  batch_size: 32  # larger model needs smaller batch
  num_workers: 8
  mosaic_prob: 1.0
  mixup_prob: 0.5

optimizer:
  lr: 8.0e-4  # lower LR for larger model
  momentum: 0.9
  weight_decay: 0.0005

training:
  max_epochs: 50
  warmup_epochs: 5
  val_interval: 1
  save_interval: 2
  grad_clip: 35.0

output_dir: runs/ccpe_base_1024
log_interval: 50
